<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculty Blockchain Dashboard</title>
<style>
    /* ======== General Page Styling ======== */
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: url('https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcSGoeVgyGSL6dxoGuNFkkVAHoL9e5d5v3e2ZDzpRFzQV55qrmLf') 
                    no-repeat center center/cover;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
    }

    /* ======== Container ======== */
    .container {
        width: 95%;
        max-width: 500px;
        background: rgba(40, 40, 40, 0.7);
        backdrop-filter: blur(12px);
        border-radius: 15px;
        padding: 35px 30px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        display: flex;
        flex-direction: column;
        gap: 20px;
        animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(10px);}
        to {opacity: 1; transform: translateY(0);}
    }

    /* ======== Title ======== */
    h1 {
        font-size: 28px;
        font-weight: bold;
        text-align: center;
        color: #ffcc00;
        margin-bottom: 10px;
    }

    /* ======== Input Fields ======== */
    .form-group {
        margin-bottom: 16px;
    }

    .form-group input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 8px;
        border: none;
        font-size: 15px;
        outline: none;
        background: rgba(255, 255, 255, 0.9);
        color: #222;
        box-sizing: border-box;
        transition: all 0.3s ease;
    }

    .form-group input::placeholder {
        color: #666;
    }

    .form-group input:focus {
        box-shadow: 0 0 8px #ffcc00;
        background: #fff;
    }

    /* ======== Button ======== */
    .save-btn {
        background: #ff6600;
        color: #fff;
        border: none;
        padding: 14px;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
        margin-top: 10px;
        transition: 0.3s ease;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    .save-btn:hover {
        background: #ff8533;
        box-shadow: 0 0 10px rgba(255, 204, 0, 0.6);
    }
</style>
</head>

<body>
<!-- Global Navigation -->
<div style="position: absolute; top: 0; left: 0; display: flex; gap: 10px; padding: 15px 20px; width: 100%; box-sizing: border-box; background: rgba(255, 255, 255, 0.95); border-bottom: 1px solid rgba(0,0,0,0.1); z-index: 50;">
  <button onclick="window.history.back()" style="padding: 8px 14px; font-size: 13px; cursor: pointer; border: 1px solid #cbd5e1; border-radius: 6px; background: #f8fafc; font-weight: 600; color: #334155;">⬅ Back</button>
  <button onclick="window.history.forward()" style="padding: 8px 14px; font-size: 13px; cursor: pointer; border: 1px solid #cbd5e1; border-radius: 6px; background: #f8fafc; font-weight: 600; color: #334155;">Forward ➡</button>
  <button onclick="window.location.reload()" style="padding: 8px 14px; font-size: 13px; cursor: pointer; border: 1px solid #cbd5e1; border-radius: 6px; background: #f8fafc; font-weight: 600; color: #334155;">↻ Refresh</button>
  <button onclick="goBackToHome()" style="padding: 8px 14px; font-size: 13px; cursor: pointer; border: none; border-radius: 6px; background: #2563eb; color: white; font-weight: 600; margin-left: 10px;">🏠 Homepage</button>
</div>
<script>
  function goBackToHome() {
      const r = localStorage.getItem('role');
      if (r && (r === 'ROLE_STUDENT' || r.toLowerCase() === 'student')) {
          window.location.href = 'student_dashboard.html';
      } else {
          window.location.href = 'teacher_list.html';
      }
  }
</script>
<div class="container" style="margin-top: 50px;">
    <h1>Faculty Blockchain Dashboard</h1>

    <div class="form-group">
        <input type="text" id="name" placeholder="Name">
    </div>

    <div class="form-group">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="form-group">
        <input type="password" id="password" placeholder="Password">
    </div>

    <div class="form-group">
        <input type="text" id="department" placeholder="Department">
    </div>

    <div class="form-group">
        <input type="text" id="joining" placeholder="Date of Joining"
        onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'">
    </div>

    <button class="save-btn" onclick="saveProfile()">Save Profile</button>
</div>

<script>
    const apiBase = window.location.origin + "/api";
    const authBase = window.location.origin + "/auth";

    function saveProfile() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const department = document.getElementById('department').value.trim();
        const dateOfJoining = document.getElementById('joining').value;

        if (!name || !email || !password) {
            alert("Name, Email, and Password are required!");
            return;
        }

        // Form data for blockchain faculty info
        const formData1 = new URLSearchParams();
        formData1.append("name", name);
        formData1.append("email", email);
        formData1.append("password", password);
        formData1.append("department", department);
        formData1.append("dateOfJoining", dateOfJoining);
        formData1.append("publications", 0);
        formData1.append("research", "");
        formData1.append("professionalActivity", "");
        formData1.append("projects", "");

        // User signup info
        const signupData = {
            name: name,
            email: email,
            password: password,
            role: "teacher"
        };

        // First API: add faculty to blockchain
        fetch(`${apiBase}/add`, {
            method: "POST",
            body: formData1,
            mode: "cors"
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                alert("Faculty information added successfully!");
            } else {
                alert("Error: " + (data.message || "Something went wrong"));
            }
        })
        .catch(err => {
            console.error("Request failed:", err);
            alert("Error while saving faculty data.");
        });

        // Second API: user signup
        fetch(`${authBase}/signup`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(signupData),
            mode: "cors"
        })
        .then(async res => {
            const data = await res.json();
            alert(data.message || "Signup completed.");
        })
        .catch(err => {
            console.error("Signup error:", err);
            alert("Error while signing up. Try again later.");
        });
    }
</script>
</body>
</html>
