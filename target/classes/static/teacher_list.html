<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Teacher List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }

        .page-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .header-left {
            justify-self: start;
        }

        h2 {
            justify-self: center;
            margin: 0;
        }

        .header-right {
            justify-self: end;
            display: flex;
            gap: 12px;
        }

        .add-btn {
            font-size: 15px;
            padding: 12px 20px;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #addActionBtn {
            background: #673ab7;
        }

        #viewedit {
            color: antiquewhite;
            background: #001eff;
        }

        .teacher-card {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            transition: 0.2s ease;
        }

        .teacher-card:hover {
            transform: scale(1.02);
        }

        .header {
            font-weight: bold;
            font-size: 18px;
        }

        .details {
            margin-top: 8px;
            color: #444;
        }

        button {
            margin-right: 10px;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .view-btn {
            background: #007bff;
            color: white;
        }

        .edit-btn {
            background: #28a745;
            color: white;
        }

        .attend-btn {
            background: #ff9800;
            color: white;
        }

        .marks-btn {
            background: #e91e63;
            color: white;
        }

        .mar-btn {
            background: #b52ef4;
            color: white;
        }

        .moocs-btn {
            background: #cc4c1a;
            color: white;
        }
    </style>
</head>

<body>

    <!-- Global Navigation -->
    <div
        style="display: flex; gap: 10px; padding: 15px 20px; width: 100%; box-sizing: border-box; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 50;">
        <button onclick="window.history.back()"
            style="padding: 8px 14px; font-size: 13px; cursor: pointer; border: 1px solid #cbd5e1; border-radius: 6px; background: #f8fafc; font-weight: 600; color: #334155;">⬅
            Back</button>
        <button onclick="window.history.forward()"
            style="padding: 8px 14px; font-size: 13px; cursor: pointer; border: 1px solid #cbd5e1; border-radius: 6px; background: #f8fafc; font-weight: 600; color: #334155;">Forward
            ➡</button>
        <button onclick="window.location.reload()"
            style="padding: 8px 14px; font-size: 13px; cursor: pointer; border: 1px solid #cbd5e1; border-radius: 6px; background: #f8fafc; font-weight: 600; color: #334155;">↻
            Refresh</button>
        <button onclick="goBackToHome()"
            style="padding: 8px 14px; font-size: 13px; cursor: pointer; border: none; border-radius: 6px; background: #2563eb; color: white; font-weight: 600; margin-left: 10px;">🏠
            Homepage</button>
    </div>
    <script>
        function goBackToHome() {
            const r = localStorage.getItem('role');
            if (r) {
                const rl = r.toLowerCase();
                if (rl === 'student' || rl === 'role_student') {
                    window.location.href = 'student_dashboard.html';
                } else if (rl === 'teacher' || rl === 'role_teacher') {
                    window.location.href = 'teacher_dashboard.html';
                } else {
                    window.location.href = 'teacher_list.html';
                }
            } else {
                window.location.href = 'login.html';
            }
        }
    </script>
    <div class="page-header">
        <div class="header-left"></div>

        <h2>Faculty List</h2>

        <div class="header-right">
            <button id="viewedit" class="add-btn" onclick="location.href='student_list.html'" style="display:none;">
                View / Edit Students
            </button>

            <button id="addActionBtn" class="add-btn" style="display:none;">
            </button>
        </div>
    </div>

    <div id="teacherContainer"></div>

    <div id="otpModal" style="
        display:none;
        position:fixed;
        top:0; left:0;
        width:100%; height:100%;
        background:rgba(0,0,0,0.5);
        justify-content:center;
        align-items:center;
    ">
        <div style="background:white; padding:20px; border-radius:10px; text-align:center; width:300px;">
            <h3>OTP Verification</h3>
            <p id="otpEmailText"></p>
            <input type="text" id="otpInput" placeholder="Enter OTP" style="width:80%; padding:8px; margin:10px 0;">
            <br>
            <button onclick="verifyEnteredOTP()">Verify</button>
            <button onclick="closeOTPModal()">Cancel</button>
        </div>
    </div>

    <!-- COURSE ALLOCATION MODAL -->
    <div id="courseModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index: 1000;">
        <div style="background:white; padding:25px; border-radius:10px; width:400px; max-height: 80vh; display: flex; flex-direction: column;">
            
            <!-- STEP 1 -->
            <div id="courseModalStep1">
                <h3 style="margin-top:0;">Allocate Course to Faculty (Step 1)</h3>
                <input type="hidden" id="courseTeacherEmail">

                <select id="courseDept" style="width:100%; padding:8px; margin-bottom:10px;">
                    <option value="">Select Department</option>
                    <option value="CSE1">CSE1</option>
                    <option value="CSE2">CSE2</option>
                    <option value="CSE3">CSE3</option>
                    <option value="IT">IT</option>
                    <option value="ECE">ECE</option>
                    <option value="EE">EE</option>
                    <option value="AIML">AIML</option>
                </select>

                <select id="courseSem" style="width:100%; padding:8px; margin-bottom:10px;">
                    <option value="">Select Semester</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                </select>

                <input type="text" id="courseId" placeholder="Course ID (e.g. CS501)"
                    style="width:100%; padding:8px; margin-bottom:10px; box-sizing: border-box;">
                <input type="text" id="courseName" placeholder="Course Name (e.g. DBMS)"
                    style="width:100%; padding:8px; margin-bottom:10px; box-sizing: border-box;">

                <select id="courseType" style="width:100%; padding:8px; margin-bottom:15px;">
                    <option value="THEORY">THEORY</option>
                    <option value="LAB">LAB</option>
                </select>

                <div style="display: flex; justify-content: space-between;">
                    <button class="add-btn" style="background:#2563eb; width:48%;"
                        onclick="goToStep2()">Next: Select Students →</button>
                    <button class="add-btn" style="background:#dc3545; width:48%;"
                        onclick="closeCourseModal()">Cancel</button>
                </div>
            </div>

            <!-- STEP 2 -->
            <div id="courseModalStep2" style="display:none; flex: 1; min-height: 0; flex-direction: column;">
                <h3 style="margin-top:0;">Select Students for Enrollment (Step 2)</h3>
                <div style="margin-bottom: 10px;">
                    <button class="add-btn" style="background:#64748b; padding:4px 8px; font-size:12px; margin-right:5px;" onclick="selectAllStudents(true)">Select All</button>
                    <button class="add-btn" style="background:#64748b; padding:4px 8px; font-size:12px;" onclick="selectAllStudents(false)">Deselect All</button>
                </div>
                <div id="studentChecklist" style="flex: 1; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 4px; padding: 10px; margin-bottom: 15px;">
                    <!-- Checkboxes go here -->
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: auto;">
                    <button class="add-btn" style="background:#64748b; width:30%;"
                        onclick="goToStep1()">← Back</button>
                    <button class="add-btn" style="background:#28a745; width:65%;"
                        onclick="submitCourseAllocationAndEnrollment()">Save & Enroll</button>
                </div>
            </div>

        </div>
    </div>

    <!-- MENTOR ASSIGNMENT MODAL -->
    <div id="mentorModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index: 1000;">
        <div style="background:white; padding:25px; border-radius:10px; width:350px;">
            <h3 style="margin-top:0;">Assign as Mentor</h3>
            <input type="hidden" id="mentorTeacherEmail">

            <select id="mentorDept" style="width:100%; padding:8px; margin-bottom:10px;">
                <option value="">Select Department</option>
                <option value="CSE1">CSE1</option>
                <option value="CSE2">CSE2</option>
                <option value="CSE3">CSE3</option>
                <option value="IT">IT</option>
                <option value="ECE">ECE</option>
                <option value="EE">EE</option>
                <option value="AIML">AIML</option>
            </select>

            <select id="mentorSem" style="width:100%; padding:8px; margin-bottom:10px;">
                <option value="">Select Semester</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
            </select>

            <div style="display: flex; gap: 10px; margin-bottom:15px;">
                <input type="number" id="mentorStartRoll" placeholder="Start Roll (e.g. 1)" style="flex: 1; padding:8px; box-sizing:border-box;">
                <input type="number" id="mentorEndRoll" placeholder="End Roll (e.g. 20)" style="flex: 1; padding:8px; box-sizing:border-box;">
            </div>

            <div style="display: flex; justify-content: space-between;">
                <button class="add-btn" style="background:#28a745; width:48%;"
                    onclick="submitMentorAssignment()">Assign</button>
                <button class="add-btn" style="background:#dc3545; width:48%;"
                    onclick="closeMentorModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const apiBase = window.location.origin + "/api";

        const role = localStorage.getItem('role');
        const email = localStorage.getItem('email');
        const sessionToken = localStorage.getItem("sessionToken");

        if (!role || !sessionToken) {
            window.location.href = "login.html";
        }

        // Verify session with backend
        async function checkSession() {
            try {
                const res = await fetch(window.location.origin + `/auth/verify-session?email=${encodeURIComponent(email)}&token=${encodeURIComponent(sessionToken)}`);
                if (!res.ok) {
                    alert("Session conflict: Logged in from another device");
                    localStorage.clear();
                    window.location.href = "login.html";
                }
            } catch (err) {
                console.error("Session verification failed", err);
            }
        }
        checkSession();

        const container = document.getElementById("teacherContainer");

        async function loadTeachers() {
            try {
                const response = await fetch(`${apiBase}/all`);

                // --- FIX 1: Use 'let' instead of 'const' so we can filter ---
                let facultyList = await response.json();

                // --- FIX 2: THE MAGIC FILTER (UPDATED) ---
                // Removes Attendance, Marks, MAR, and MOOCs records from the UI list so they don't overwrite real names!
                if (Array.isArray(facultyList)) {
                    facultyList = facultyList.filter(block =>
                        block.name !== "ATTENDANCE_RECORD" &&
                        block.name !== "MARKS_RECORD" &&
                        block.name !== "MAR_RECORD" &&
                        block.name !== "MOOCS_RECORD"
                    );
                }
                // -------------------------------------------------------------

                // show add faculty button for SuperAdmin, add student button for Admin
                const addBtn = document.getElementById("addActionBtn");

                // show view or edit student button for Admin
                const veBtn = document.getElementById("viewedit");

                if (role) {
                    const r = role.toLowerCase();

                    if (r === "superadmin") {
                        addBtn.innerText = "Add Faculty +";
                        addBtn.onclick = goToAddFaculty;
                        addBtn.style.display = "block";

                        // ── DANGER ZONE: Reset all data (dev/testing only) ──
                        const resetBtn = document.createElement('button');
                        resetBtn.innerText = "🗑️ Reset All Data";
                        resetBtn.className = "add-btn";
                        resetBtn.style.background = "#b91c1c";
                        resetBtn.onclick = resetAllData;
                        document.querySelector('.header-right').appendChild(resetBtn);
                    }
                    else if (r === "admin") {
                        addBtn.innerText = "Add Student +";
                        addBtn.onclick = goToAddStudent;
                        addBtn.style.display = "block";
                        veBtn.style.display = "block";
                    }
                }

                // If API returned error-like object or not an array
                if (!Array.isArray(facultyList)) {
                    console.error("Unexpected /all response:", facultyList);
                    container.innerHTML = "<p>Error loading data. Check console for details.</p>";
                    return;
                }

                // Deduplicate by email: keep the latest block per email (prefer higher timestamp)
                const map = {}; // emailLower -> block
                facultyList.forEach(block => {
                    if (!block || !block.email) return;
                    const key = String(block.email).toLowerCase();
                    const existing = map[key];

                    const bTs = (block.timestamp !== undefined && block.timestamp !== null)
                        ? Number(block.timestamp)
                        : null;
                    const eTs = (existing && existing.timestamp !== undefined && existing.timestamp !== null)
                        ? Number(existing.timestamp)
                        : null;

                    if (!existing) {
                        // first occurrence
                        map[key] = block;
                    } else if (bTs != null && eTs != null) {
                        // both have timestamps -> pick larger (more recent)
                        if (bTs > eTs) map[key] = block;
                    } else if (bTs != null && eTs == null) {
                        // new has timestamp, existing doesn't -> prefer new
                        map[key] = block;
                    } else if (bTs == null && eTs != null) {
                        // keep existing (it has timestamp)
                        // nothing
                    } else {
                        // neither has timestamp -> prefer the later occurrence (override)
                        map[key] = block;
                    }
                });

                // Convert map to array of unique latest faculty records
                let dedupedList = Object.values(map);

                // Filter data based on role (do this after dedupe)
                if (role && role.toLowerCase() === "teacher" && email) {
                    dedupedList = dedupedList.filter(f => f.email && f.email.toLowerCase() === email.toLowerCase());
                }

                // Clear container
                container.innerHTML = "";

                if (!dedupedList || dedupedList.length === 0) {
                    container.innerHTML = "<p>No faculty data records available</p>";
                    return;
                }

                // If Admin or SuperAdmin, fetch all courses and mentor assignments to display
                let allCourses = [];
                let allMentors = {};
                if (role && (role.toLowerCase() === 'admin' || role.toLowerCase() === 'superadmin')) {
                    try {
                        const courseRes = await fetch(`${apiBase}/../course/all`);
                        if(courseRes.ok) {
                            allCourses = await courseRes.json();
                        }
                        const mentorRes = await fetch(`${apiBase}/mentor/all`);
                        if(mentorRes.ok) {
                            allMentors = await mentorRes.json();
                        }
                    } catch(e) {
                        console.error('Failed to load extra faculty details', e);
                    }
                }

                // Display each faculty card (one card per teacher)
                dedupedList.forEach(faculty => {
                    const card = document.createElement("div");
                    card.className = "teacher-card";

                    const name = faculty.name || "Unnamed";
                    const dept = faculty.department || "—";
                    const mail = faculty.email || "—";

                    card.innerHTML = `
                        <div class="header">${escapeHtml(name)}</div>
                        <div class="details">
                            Email: ${escapeHtml(mail)} | Department: ${escapeHtml(dept)}
                        </div>
                        <div style="margin-top:10px;">
                            <button class="view-btn" onclick="viewFaculty('${encodeURIComponent(mail)}')">VIEW</button>
                            ${role && role.toLowerCase() === 'admin' ? `
                                <button class="add-btn" style="background:#009688;" onclick="openCourseModal('${encodeURIComponent(mail)}')">ALLOCATE COURSE</button>
                                <button class="add-btn" style="background:#6366f1;" onclick="openMentorModal('${encodeURIComponent(mail)}')">ASSIGN MENTOR</button>
                            ` : ''}
                            ${role && role.toLowerCase() === 'teacher' ? `
                                <button class="edit-btn" onclick="editFaculty('${encodeURIComponent(mail)}')">EDIT</button>
                                <button class="attend-btn" onclick="otpVerify('${encodeURIComponent(mail)}', 'ATTENDANCE')">ATTENDANCE</button>
                                <button class="marks-btn" onclick="otpVerify('${encodeURIComponent(mail)}', 'MARKS')">MARKS</button>
                                <button class="mar-btn" onclick="otpVerify('${encodeURIComponent(mail)}', 'MAR')">MAR</button>
                                <button class="moocs-btn" onclick="otpVerify('${encodeURIComponent(mail)}', 'MOOCS')">MOOCS</button>
                            ` : ''}
                        </div>
                    `;

                    // For Admin/Superadmin: show courses and mentor status
                    if (role && (role.toLowerCase() === 'admin' || role.toLowerCase() === 'superadmin')) {
                        const teacherCourses = allCourses.filter(c => c.teacherEmail === mail);
                        let adminPanelHtml = '<div style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">';
                        
                        // Courses
                        if (teacherCourses.length > 0) {
                            let courseHtml = '<div style="padding: 10px; background: #f8f9fa; border-radius: 6px; border-left: 4px solid #007bff;">';
                            courseHtml += '<strong style="color: #333; font-size: 14px;">Allocated Courses:</strong><ul style="margin: 5px 0 0 0; padding-left: 20px; font-size: 14px; color: #555;">';
                            teacherCourses.forEach(c => {
                                courseHtml += `<li>${escapeHtml(c.courseId)} - ${escapeHtml(c.courseName)} (${escapeHtml(c.subjectType)}) - Sem ${escapeHtml(c.semester)}</li>`;
                            });
                            courseHtml += '</ul></div>';
                            adminPanelHtml += courseHtml;
                        } else {
                            adminPanelHtml += '<div style="font-size: 13px; color: #777;"><em>No courses allocated</em></div>';
                        }

                        // Mentor Data
                        const mentorData = allMentors[mail.toLowerCase()];
                        if (mentorData) {
                            adminPanelHtml += `
                            <div style="padding: 10px; background: #fdfaf6; border-radius: 6px; border-left: 4px solid #6366f1;">
                                <strong style="color: #333; font-size: 14px;">Mentor Assignment:</strong>
                                <div style="font-size: 14px; color: #555; margin-top: 4px;">
                                    ${escapeHtml(mentorData.department)} Semester ${escapeHtml(mentorData.semester)} <br>
                                    <span style="font-size: 13px; opacity: 0.8;">(Rolls: ${escapeHtml(mentorData.startRoll)} - ${escapeHtml(mentorData.endRoll)})</span>
                                </div>
                            </div>`;
                        }

                        adminPanelHtml += '</div>';
                        card.innerHTML += adminPanelHtml;
                    }

                    container.appendChild(card);
                });

            } catch (error) {
                console.error("Error loading faculty:", error);
                container.innerHTML = "<p>Error loading data. Check console for details.</p>";
            }
        }

        // Simple HTML escaper for inserted text
        function escapeHtml(str) {
            if (str === null || str === undefined) return "";
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        let currentEmail = "";
        let currentName = "";

        async function otpVerify(emailParam, name) {
            try {
                // decode because we encoded when building onclick
                const decodedEmail = decodeURIComponent(emailParam);
                currentEmail = decodedEmail;
                currentName = name;

                // Check if already verified in this session
                if (sessionStorage.getItem('otpVerified_' + decodedEmail) === "true") {
                    redirectBasedOnName(currentEmail, currentName);
                    return;
                }

                // Step 1: Send OTP
                const sendRes = await fetch(`${apiBase}/send-otp?email=${encodeURIComponent(decodedEmail)}`, {
                    method: 'POST'
                });
                const sendData = await sendRes.json();
                alert(sendData.message);

                // Step 2: Show OTP modal
                document.getElementById("otpEmailText").innerText = `Enter OTP sent to ${decodedEmail}`;
                document.getElementById("otpModal").style.display = "flex";
            } catch (err) {
                console.error(err);
                alert("Error sending OTP. Check console.");
            }
        }

        async function verifyEnteredOTP() {
            const otp = document.getElementById("otpInput").value;
            if (!otp) {
                alert("Please enter OTP!");
                return;
            }

            try {
                const verifyRes = await fetch(`${apiBase}/verify-otp?email=${encodeURIComponent(currentEmail)}&otp=${otp}`);
                const verifyData = await verifyRes.json();

                if (verifyData.status === "success") {
                    alert("OTP verified successfully!");
                    sessionStorage.setItem('otpVerified_' + currentEmail, 'true');
                    closeOTPModal();
                    redirectBasedOnName(currentEmail, currentName);
                } else {
                    alert("Invalid or expired OTP!");
                }
            } catch (err) {
                console.error(err);
                alert("Error verifying OTP. Check console.");
            }
        }

        function redirectBasedOnName(email, targetName) {
            if (targetName === "ATTENDANCE") {
                window.location.href = `attendance.html?email=${encodeURIComponent(email)}`;
            }
            else if (targetName === "MARKS") {
                window.location.href = `marks.html?email=${encodeURIComponent(email)}`;
            }
            else if (targetName === "MAR") {
                window.location.href = `mar.html?email=${encodeURIComponent(email)}`;
            }
            else if (targetName === "MOOCS") {
                window.location.href = `moocs.html?email=${encodeURIComponent(email)}`;
            }
            else {
                // default (EDIT faculty)
                window.location.href = `edit_faculty.html?email=${encodeURIComponent(email)}`;
            }
        }

        function closeOTPModal() {
            document.getElementById("otpModal").style.display = "none";
            document.getElementById("otpInput").value = "";
        }

        function goToAddFaculty() {
            window.location.href = 'add_faculty.html';
        }

        async function resetAllData() {
            const warn1 = confirm(
                "⚠️ WARNING\n\n" +
                "This will permanently delete ALL system data including:\n" +
                "  • All teachers and teacher records\n" +
                "  • All students and student records\n" +
                "  • All admins\n" +
                "  • All attendance records\n" +
                "  • All marks records\n" +
                "  • All MAR and MOOCs records\n" +
                "  • All course allocations\n\n" +
                "This action is intended for TESTING AND DEVELOPMENT ONLY.\n\n" +
                "Are you sure you want to continue?"
            );
            if (!warn1) return;

            const warn2 = confirm(
                "FINAL CONFIRMATION\n\n" +
                "Click OK to erase ALL data now.\n" +
                "This cannot be undone."
            );
            if (!warn2) return;

            try {
                const res = await fetch(window.location.origin + '/auth/reset-all', { method: 'POST' });
                const data = await res.json();
                if (res.ok) {
                    alert("✅ All data cleared.\n\nRestart the server to restore default login credentials, then log in again.");
                    localStorage.clear();
                    window.location.href = 'login.html';
                } else {
                    alert("❌ Reset failed: " + (data.message || 'Unknown error'));
                }
            } catch (err) {
                alert("❌ Network error during reset: " + err.message);
            }
        }

        function goToAddStudent() {
            window.location.href = 'add_student.html';
        }

        function viewFaculty(encodedEmail) {
            const e = decodeURIComponent(encodedEmail);
            window.location.href = `view_faculty.html?email=${encodeURIComponent(e)}`;
        }

        function editFaculty(encodedEmail) {
            const e = decodeURIComponent(encodedEmail);
            let targetName = 'EDIT'; // --- FIX 3: Fixed global variable collision ---
            otpVerify(e, targetName);
        }

        // --- COURSE ALLOCATION LOGIC ---
        function openCourseModal(encodedEmail) {
            const e = decodeURIComponent(encodedEmail);
            document.getElementById('courseTeacherEmail').value = e;
            document.getElementById('courseModal').style.display = 'flex';
        }

        let tempStudentsList = [];

        function closeCourseModal() {
            document.getElementById('courseModal').style.display = 'none';
            // clear fields
            document.getElementById('courseDept').value = '';
            document.getElementById('courseSem').value = '';
            document.getElementById('courseId').value = '';
            document.getElementById('courseName').value = '';
            document.getElementById('courseType').value = 'THEORY';
            goToStep1();
        }

        function goToStep1() {
            document.getElementById('courseModalStep1').style.display = 'block';
            document.getElementById('courseModalStep2').style.display = 'none';
        }

        async function goToStep2() {
            const department = document.getElementById('courseDept').value;
            const semester = document.getElementById('courseSem').value;
            const courseId = document.getElementById('courseId').value.trim();
            const courseName = document.getElementById('courseName').value.trim();

            if (!department || !semester || !courseId || !courseName) {
                alert("Please fill in all course details.");
                return;
            }

            try {
                const res = await fetch(window.location.origin + `/course/students?department=${encodeURIComponent(department)}&semester=${encodeURIComponent(semester)}`);
                if (!res.ok) throw new Error("Failed to load students for this class.");
                tempStudentsList = await res.json();
                
                renderStudentChecklist();
                
                document.getElementById('courseModalStep1').style.display = 'none';
                document.getElementById('courseModalStep2').style.display = 'flex';
            } catch(e) {
                alert("Error: " + e.message);
            }
        }

        function renderStudentChecklist() {
            const container = document.getElementById('studentChecklist');
            container.innerHTML = '';
            if(!tempStudentsList || tempStudentsList.length === 0) {
                container.innerHTML = '<p style="color:#64748b;font-size:14px;text-align:center;">No students found for this department and semester.</p>';
                return;
            }
            tempStudentsList.forEach((s, idx) => {
                const div = document.createElement('div');
                div.style.marginBottom = "8px";
                div.innerHTML = `<label style="cursor:pointer; display:flex; align-items:center; font-size:14px;">
                    <input type="checkbox" id="chk_std_${idx}" checked style="margin-right:10px;">
                    ${s.classRoll || '--'} - ${s.name || '(No Name)'} (${s.roll || '--'})
                </label>`;
                container.appendChild(div);
            });
        }

        function selectAllStudents(select) {
            if(!tempStudentsList) return;
            tempStudentsList.forEach((_, idx) => {
                const cb = document.getElementById(`chk_std_${idx}`);
                if(cb) cb.checked = select;
            });
        }

        async function submitCourseAllocationAndEnrollment() {
            const teacherEmail = document.getElementById('courseTeacherEmail').value;
            const department = document.getElementById('courseDept').value;
            const semester = document.getElementById('courseSem').value;
            const courseId = document.getElementById('courseId').value.trim();
            const courseName = document.getElementById('courseName').value.trim();
            const subjectType = document.getElementById('courseType').value;

            // Get selected students
            const selectedStudents = [];
            tempStudentsList.forEach((s, idx) => {
                const cb = document.getElementById(`chk_std_${idx}`);
                if(cb && cb.checked) {
                    selectedStudents.push(s);
                }
            });

            if (selectedStudents.length === 0) {
                if(!confirm("You have selected NO students. Are you sure you want to allocate this course with an empty roster?")) {
                    return;
                }
            }

            const payload1 = {
                teacherEmail, department, semester, courseId, courseName, subjectType
            };

            const payload2 = {
                courseId,
                students: selectedStudents
            };

            try {
                // 1. Allocate Course
                const res1 = await fetch(window.location.origin + "/course/allocate", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload1)
                });
                if (!res1.ok) {
                    const d = await res1.json();
                    throw new Error(d.message || "Error allocating course");
                }

                // 2. Save Enrollment
                const res2 = await fetch(window.location.origin + "/course/enrollment/save", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload2)
                });
                if (!res2.ok) {
                    const d = await res2.json();
                    throw new Error(d.message || "Error saving enrollment roster");
                }

                alert("Course allocated and student enrollment saved successfully!");
                closeCourseModal();
            } catch (err) {
                console.error(err);
                alert(err.message);
            }
        }

        function openMentorModal(encodedEmail) {
            const e = decodeURIComponent(encodedEmail);
            document.getElementById('mentorTeacherEmail').value = e;
            document.getElementById('mentorModal').style.display = 'flex';
        }

        function closeMentorModal() {
            document.getElementById('mentorModal').style.display = 'none';
            document.getElementById('mentorDept').value = '';
            document.getElementById('mentorSem').value = '';
            document.getElementById('mentorStartRoll').value = '';
            document.getElementById('mentorEndRoll').value = '';
        }

        async function submitMentorAssignment() {
            const teacherEmail = document.getElementById('mentorTeacherEmail').value;
            const department = document.getElementById('mentorDept').value;
            const semester = document.getElementById('mentorSem').value;
            const startRoll = document.getElementById('mentorStartRoll').value;
            const endRoll = document.getElementById('mentorEndRoll').value;

            if (!department || !semester) {
                alert("Please select both Department and Semester.");
                return;
            }

            try {
                const payload = { teacherEmail, department, semester, startRoll, endRoll };
                const res = await fetch(apiBase + "/mentor/assign", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (res.ok) {
                    alert("Mentor assigned successfully!");
                    closeMentorModal();
                } else {
                    alert("Error: " + (data.message || "Failed to assign mentor"));
                }
            } catch (err) {
                console.error(err);
                alert("Network error assigning mentor.");
            }
        }

        loadTeachers();
    </script>

</body>

</html>
