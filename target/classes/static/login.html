<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | Faculty Blockchain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #f3f4f6, #dbeafe);
            padding-top: 50px;
        }

        .card {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="card">
        <h3 class="text-center mb-4">Login to Faculty Blockchain</h3>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Select Role</label>
                <select class="form-select" id="role" required>
                    <option value="">--Choose--</option>
                    <option value="teacher">Teacher</option>
                    <option value="admin">Admin</option>
                    <option value="superadmin">Super Admin</option>
                    <option value="student">Student</option>
                </select>
            </div>


            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>


            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" required>
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                        <img id="togglePasswordIcon" src="eye-closed.png" alt="Show Password" style="width: 20px; height: 20px;">
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Captcha</label>
                <div class="d-flex align-items-center">
                    <input type="text" class="form-control me-2" id="captchaInput" placeholder="Enter captcha" required>
                    <span id="captchaCode" class="fw-bold text-primary"></span>
                    <button type="button" class="btn btn-sm btn-outline-secondary ms-2"
                        onclick="generateCaptcha()">⟳</button>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Login</button>
            </div>
            <div class="mt-4 text-center">
                <a href="forgot_password.html" class="text-blue-500 hover:underline text-sm">Forgot Password?</a>
            </div>
        </form>
    </div>

    <script>
        let generatedCaptcha = "";

        function generateCaptcha() {
            generatedCaptcha = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('captchaCode').innerText = generatedCaptcha;
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const role = document.getElementById('role').value;
            const name = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const enteredCaptcha = document.getElementById('captchaInput').value.toUpperCase();

            if (!role || !name || !email || !password || !enteredCaptcha) {
                alert("All fields are required.");
                return;
            }

            if (enteredCaptcha !== generatedCaptcha) {
                alert("Captcha incorrect. Please try again.");
                generateCaptcha();
                return;
            }

            try {
                // Sending JSON to authenticate
                const res = await fetch(window.location.origin + "/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        password: password,
                        role: role
                    })
                });

                const resultText = await res.text();

                if (res.ok) {
                    // Saving user info locally
                    const data = JSON.parse(resultText);
                    localStorage.setItem("username", name);
                    localStorage.setItem("email", email);
                    localStorage.setItem("role", role);
                    localStorage.setItem("sessionToken", data.sessionToken);

                    if (role === 'student') {
                        localStorage.setItem("studentID", data.studentID || "");
                        localStorage.setItem("classRoll", data.classRoll || "");
                        localStorage.setItem("department", data.department || "");
                        localStorage.setItem("semester", data.semester || "");
                        localStorage.setItem("passingYear", data.passingYear || "");
                    }

                    alert("Login successful!");
                    if (role === "student") {
                        window.location.href = "student_dashboard.html";
                    } else if (role === "teacher") {
                        window.location.href = "teacher_dashboard.html";
                    } else {
                        window.location.href = "teacher_list.html";
                    }
                } else {
                    alert("Invalid credentials or role.");
                    generateCaptcha();
                }
            } catch (error) {
                console.error("Login error:", error);
                alert("Something went wrong. Please try again.");
                generateCaptcha();
            }
        });

        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePasswordIcon');
            const isPassword = passwordInput.getAttribute('type') === 'password';
            
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            toggleIcon.src = isPassword ? 'eye-open.png' : 'eye-closed.png';
            toggleIcon.alt = isPassword ? 'Hide Password' : 'Show Password';
        });

        window.onload = generateCaptcha;
    </script>
</body>
</html>
