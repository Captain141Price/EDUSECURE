<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mentor MAR Review Dashboard</title>
    <style>
        :root {
            --bg: #f4f7f9;
            --panel: #ffffff;
            --accent: #1e293b;
            --muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-bg: #eff6ff;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        html, body {
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--accent);
            display: flex;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.02);
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--primary);
            color: white;
            text-align: center;
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 0;
            overflow-y: auto;
        }

        .nav-item {
            display: block;
            padding: 12px 24px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
            border-left: 4px solid transparent;
        }

        .nav-item:hover {
            background: var(--secondary-bg);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--secondary-bg);
            color: var(--primary);
            border-left-color: var(--primary);
        }

        .logout-btn {
            margin: 20px;
            padding: 10px;
            background: #ef4444;
            color: white;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .logout-btn:hover { background: #dc2626; }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            padding: 15px 30px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        .header { font-size: 24px; font-weight: 800; margin-bottom: 20px; color: var(--accent); display: flex; justify-content: space-between; align-items: center; }
        
        .mentor-badge {
            background: var(--secondary-bg); color: var(--primary); font-size: 14px; 
            padding: 8px 16px; border-radius: 20px; font-weight: 700; border: 1px solid #bfdbfe;
        }

        .table-wrap {
            background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid var(--border); }
        thead th { background: var(--secondary-bg); color: var(--primary-hover); font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        tbody tr:hover { background: #f8fafc; }

        .status-badge {
            padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 700;
            display: inline-block;
        }
        .status-pending { background: #fef3c7; color: #b45309; }
        .status-approved { background: #d1fae5; color: #047857; }
        .status-declined { background: #fee2e2; color: #b91c1c; }

        .btn {
            padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer;
            font-size: 12px; font-weight: 700; color: white; margin-right: 5px; transition: 0.2s;
        }
        .btn-approve { background: var(--success); }
        .btn-approve:hover { background: #059669; }
        .btn-decline { background: var(--danger); }
        .btn-decline:hover { background: #dc2626; }
        .btn-view { background: var(--primary); text-decoration: none; display: inline-block; }
        .btn-view:hover { background: var(--primary-hover); }

        #errorMsg { color: var(--danger); font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-header">
        <h2>Teacher Portal</h2>
        <div style="font-size: 12px; opacity: 0.8;">Blockchain Secured</div>
    </div>
    <div class="sidebar-nav">
        <a class="nav-item" href="teacher_dashboard.html">Dashboard Home</a>
        <a class="nav-item" href="teacher_dashboard.html" onclick="alert('Please select a course from the dashboard to mark Attendance'); return false;">Attendance</a>
        <a class="nav-item" href="teacher_dashboard.html" onclick="alert('Please select a course from the dashboard to enter Marks'); return false;">Marks</a>
        <a class="nav-item active" href="#" onclick="window.location.reload(); return false;">MAR Review</a>
        <a class="nav-item" href="#" onclick="goToMentorPage('moocs.html'); return false;">MOOCs Review</a>
    </div>
    <div class="logout-btn" onclick="logout()">Log Out</div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">
    <div class="topbar">
        <div style="font-size: 18px; font-weight: 700;">Welcome, <span id="welcomeName" style="color: var(--primary);">Mentor</span></div>
        <div style="font-size: 13px; color: var(--muted); font-weight: 500;">Role: <span style="color: var(--accent); font-weight: 700;">Teacher</span></div>
    </div>

    <div class="content-area">
        <div class="container">
    <div class="header">
        Mentor MAR Review Dashboard
        <span id="mentorBadge" class="mentor-badge" style="display: none;">Assigned to: <span id="mentorDeptSem"></span></span>
    </div>

    <div id="errorMsg"></div>

    <div class="table-wrap">
        <table id="marTable">
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Roll No</th>
                    <th>Event/Activity</th>
                    <th>Points</th>
                    <th>Date</th>
                    <th>Proof</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="marTbody">
                <tr><td colspan="8" style="text-align: center; color: var(--muted);">Loading submissions...</td></tr>
            </tbody>
        </table>
    </div>
        </div>
    </div>
</div>

<script>
    const apiBase = window.location.origin + "/api/mentor";
    const urlParams = new URLSearchParams(window.location.search);
    const teacherEmail = urlParams.get('email') || localStorage.getItem('email');
    
    document.getElementById("welcomeName").textContent = teacherEmail ? encodeURIComponent(teacherEmail) : "--";

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    function goToMentorPage(page) {
        window.location.href = `${page}?email=${encodeURIComponent(teacherEmail)}`;
    }

    async function initDashboard() {
        if (!teacherEmail) {
            document.getElementById('errorMsg').textContent = "Unauthorized: No teacher email found.";
            return;
        }

        try {
            // Check mentor assignment
            let res = await fetch(`${apiBase}/assignment?teacherEmail=${encodeURIComponent(teacherEmail)}`);
            let assignment = await res.json();

            if (assignment.isMentor !== "true") {
                document.getElementById('marTbody').innerHTML = `<tr><td colspan="8" style="text-align:center;color:red;font-weight:bold;">You are not assigned as a Mentor. Access Denied.</td></tr>`;
                return;
            }

            document.getElementById('mentorBadge').style.display = 'inline-block';
            document.getElementById('mentorDeptSem').textContent = `${assignment.department} - Passing Year ${assignment.passingYear || assignment.semester}`;

            loadSubmissions();
        } catch (e) {
            document.getElementById('errorMsg').textContent = "Failed to load mentor assignment.";
            console.error(e);
        }
    }

    async function loadSubmissions() {
        try {
            let res = await fetch(`${apiBase}/mar/submissions?teacherEmail=${encodeURIComponent(teacherEmail)}`);
            if(!res.ok) throw new Error("Failed fetching submissions");
            let data = await res.json();
            
            const tbody = document.getElementById('marTbody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--muted);">No MAR submissions found for your assigned students.</td></tr>`;
                return;
            }

            // sort by newest first based on submittedAt if available
            data.sort((a,b) => (b.submittedAt || 0) - (a.submittedAt || 0));

            data.forEach(sub => {
                const tr = document.createElement('tr');
                
                const dateStr = sub.submittedAt ? new Date(sub.submittedAt).toLocaleDateString() : 'N/A';
                
                let statusClass = 'status-pending';
                if (sub.status === 'Approved') statusClass = 'status-approved';
                if (sub.status === 'Declined') statusClass = 'status-declined';

                let actionsHtml = '';
                if (sub.status === 'Pending') {
                    actionsHtml = `
                        <button class="btn btn-approve" onclick="reviewSubmission('${sub.hash}', 'Approved')">Approve</button>
                        <button class="btn btn-decline" onclick="reviewSubmission('${sub.hash}', 'Declined')">Decline</button>
                    `;
                } else {
                    actionsHtml = `<span style="color:var(--muted);font-size:12px;">Reviewed</span>`;
                }

                let proofHtml = sub.filePath ? `<a href="${window.location.origin}/uploads/${sub.filePath}" target="_blank" class="btn btn-view">View PDF</a>` : 'No Proof';

                tr.innerHTML = `
                    <td style="font-weight:600;">${escapeHtml(sub.studentEmail)}</td> <!-- Falling back to email for name currently -->
                    <td>${escapeHtml(sub.roll || '--')}</td>
                    <td>${escapeHtml(sub.name || 'Unnamed Event')}</td>
                    <td style="font-weight:bold; color:var(--primary);">${escapeHtml(sub.points || '0')}</td>
                    <td>${dateStr}</td>
                    <td>${proofHtml}</td>
                    <td><span class="status-badge ${statusClass}">${escapeHtml(sub.status)}</span></td>
                    <td>${actionsHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            document.getElementById('errorMsg').textContent = "Failed to load submissions.";
            console.error(e);
        }
    }

    async function reviewSubmission(hash, status) {
        if (!confirm(`Are you sure you want to ${status.toLowerCase()} this submission?`)) return;

        try {
            let res = await fetch(`${apiBase}/mar/review`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mentorEmail: teacherEmail, originalHash: hash, status: status })
            });
            if (res.ok) {
                loadSubmissions(); // reload
            } else {
                alert("Failed to record review.");
            }
        } catch (e) {
            alert("Network error.");
            console.error(e);
        }
    }

    function escapeHtml(str) {
        if (!str) return "";
        return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    initDashboard();
</script>

</body>
</html>
