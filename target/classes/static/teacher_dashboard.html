<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>

    <style>
        :root {
            --bg: #f4f7f9;
            --panel: #ffffff;
            --accent: #1e293b;
            --muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-bg: #eff6ff;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--accent);
            display: flex;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.02);
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--primary);
            color: white;
            text-align: center;
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 0;
            overflow-y: auto;
        }

        .nav-item {
            display: block;
            padding: 12px 24px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
            border-left: 4px solid transparent;
        }

        .nav-item:hover {
            background: var(--secondary-bg);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--secondary-bg);
            color: var(--primary);
            border-left-color: var(--primary);
        }

        .logout-btn {
            margin: 20px;
            padding: 10px;
            background: #ef4444;
            color: white;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            padding: 15px 30px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .welcome-text {
            font-size: 18px;
            font-weight: 700;
        }

        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-top: 30px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .course-card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .course-info h3 {
            margin: 0 0 10px 0;
            color: #2c3e50;
        }

        .course-info p {
            margin: 5px 0;
            color: #555;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            background: #e67e22;
        }

        .badge-lab {
            background: #8e44ad;
        }

        .btn-group button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.2s;
        }

        .btn-attendance {
            background: #27ae60;
        }

        .btn-attendance:hover {
            background: #219150;
        }

        .btn-marks {
            background: #2980b9;
        }

        .btn-marks:hover {
            background: #1f6391;
        }

        #noCourses {
            text-align: center;
            margin-top: 50px;
            color: #7f8c8d;
            font-size: 18px;
            display: none;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Teacher Portal</h2>
            <div style="font-size: 12px; opacity: 0.8;">Blockchain Secured</div>
        </div>
        <div class="sidebar-nav">
            <a class="nav-item active" href="teacher_dashboard.html">Dashboard Home</a>
            <a class="nav-item" href="teacher_dashboard.html" onclick="alert('Please select a course from the dashboard to mark Attendance'); return false;">Attendance</a>
            <a class="nav-item" href="teacher_dashboard.html" onclick="alert('Please select a course from the dashboard to enter Marks'); return false;">Marks</a>
            <a class="nav-item" href="#" onclick="goToMentorPage('mar.html'); return false;">MAR Review</a>
            <a class="nav-item" href="#" onclick="goToMentorPage('moocs.html'); return false;">MOOCs Review</a>
        </div>
        <div class="logout-btn" onclick="logout()">Log Out</div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="topbar">
            <div class="welcome-text">Welcome, <span id="welcomeName" style="color: var(--primary);">Teacher</span></div>
            <div style="font-size: 13px; color: var(--muted); font-weight: 500;">Role: <span style="color: var(--accent); font-weight: 700;">Teacher</span></div>
        </div>

        <div class="content-area">

        <div class="container">
            <h2>My Course Offerings</h2>
            <div id="courseContainer"></div>
            <p id="noCourses">You have not been assigned any courses yet.</p>
        </div>
    </div>

    <script>
        const role = localStorage.getItem("role");
        const email = localStorage.getItem('email');
        const sessionToken = localStorage.getItem("sessionToken");

        if (!role || role.toLowerCase() !== "teacher" || !sessionToken) {
            window.location.href = "login.html";
        }
        
        document.getElementById("welcomeName").textContent = encodeURIComponent(email);

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        async function checkSession() {
            try {
                const res = await fetch(window.location.origin + `/auth/verify-session?email=${encodeURIComponent(email)}&token=${encodeURIComponent(sessionToken)}`);
                if (!res.ok) {
                    alert("Session conflict: Logged in from another device");
                    localStorage.clear();
                    window.location.href = "login.html";
                }
            } catch (err) {
                console.error("Session verification failed", err);
            }
        }
        checkSession();

        async function loadCourses() {
            try {
                const res = await fetch(window.location.origin + `/course/by-teacher?teacherEmail=${encodeURIComponent(email)}`);
                const courses = await res.json();

                const container = document.getElementById("courseContainer");
                container.innerHTML = "";

                if (!courses || courses.length === 0) {
                    document.getElementById("noCourses").style.display = "block";
                    return;
                }

                courses.forEach(c => {
                    const badgeClass = c.subjectType === 'LAB' ? 'badge-lab' : '';

                    const el = document.createElement('div');
                    el.className = 'course-card';
                    el.innerHTML = `
                        <div class="course-info">
                            <h3>${c.courseName} (${c.courseId}) <span class="badge ${badgeClass}">${c.subjectType}</span></h3>
                            <p><strong>Department:</strong> ${c.department}</p>
                            <p><strong>Semester:</strong> ${c.semester}</p>
                        </div>
                        <div class="btn-group">
                            <button class="btn-attendance" onclick="goToAttendance('${c.courseId}', '${c.department}', '${c.semester}', '${c.subjectType}')">Attendance</button>
                            <button class="btn-marks" onclick="goToMarks('${c.courseId}', '${c.department}', '${c.semester}', '${c.subjectType}')">Marks</button>
                        </div>
                    `;
                    container.appendChild(el);
                });
            } catch (e) {
                console.error(e);
            }
        }

        function goToAttendance(courseId, dept, sem, type) {
            window.location.href = `attendance.html?courseId=${courseId}&dept=${dept}&sem=${sem}&type=${type}`;
        }

        function goToMarks(courseId, dept, sem, type) {
            window.location.href = `marks.html?courseId=${courseId}&dept=${dept}&sem=${sem}&type=${type}`;
        }

        function goToMentorPage(page) {
            window.location.href = `${page}?email=${encodeURIComponent(email)}`;
        }

        window.onload = loadCourses;
    </script>
</body>

</html>
