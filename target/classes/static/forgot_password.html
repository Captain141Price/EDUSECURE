<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-step {
            display: none;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Reset Password</h2>

        <!-- Step 1: Request OTP -->
        <div id="step-request">
            <p class="text-sm text-gray-600 mb-4 text-center">Enter your registered email address. We will send
                you an OTP to reset your password.</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input type="email" id="email" required
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button onclick="requestOtp()" id="btn-request"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Send OTP
                </button>
            </div>
        </div>

        <!-- Step 2: Verify OTP -->
        <div id="step-verify" class="hidden-step space-y-4">
            <p class="text-sm text-gray-600 mb-4 text-center">An OTP has been sent to your email. It will expire in 5
                minutes.</p>
            <div>
                <label class="block text-sm font-medium text-gray-700">Enter 6-Digit OTP</label>
                <input type="text" id="otp" required maxlength="6"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-center tracking-widest text-lg font-mono">
            </div>
            <button onclick="verifyOtp()" id="btn-verify"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Verify OTP
            </button>
        </div>

        <!-- Step 3: Reset Password -->
        <div id="step-reset" class="hidden-step space-y-4">
            <p class="text-sm text-gray-600 mb-4 text-center">OTP verified! Please enter your new password.</p>
            <div>
                <label class="block text-sm font-medium text-gray-700">New Password</label>
                <input type="password" id="newPassword" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input type="password" id="confirmPassword" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button onclick="resetPassword()" id="btn-reset"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                Update Password
            </button>
        </div>

        <div class="mt-4 text-center">
            <a href="login.html" class="text-sm text-blue-500 hover:underline">← Back to Login</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        function showStep(stepId) {
            document.getElementById('step-request').style.display = 'none';
            document.getElementById('step-verify').style.display = 'none';
            document.getElementById('step-reset').style.display = 'none';
            document.getElementById(stepId).style.display = 'block';
        }

        async function requestOtp() {
            const email = document.getElementById('email').value.trim();
            if (!email) return alert('Please enter your email.');

            const btn = document.getElementById('btn-request');
            btn.disabled = true; btn.textContent = "Sending...";

            try {
                const res = await fetch(`${API_BASE}/auth/forgot-password/generate-otp?email=${encodeURIComponent(email)}`, { method: 'POST' });
                const data = await res.json();
                if (data.status === 'success') {
                    alert(data.message);
                    showStep('step-verify');
                } else {
                    alert(data.message || 'Failed to send OTP.');
                }
            } catch (err) {
                alert('Network error. ' + err.message);
            } finally {
                btn.disabled = false; btn.textContent = "Send OTP";
            }
        }

        async function verifyOtp() {
            const email = document.getElementById('email').value.trim();
            const otp = document.getElementById('otp').value.trim();
            if (!otp) return alert('Please enter OTP.');

            const btn = document.getElementById('btn-verify');
            btn.disabled = true; btn.textContent = "Verifying...";

            try {
                const res = await fetch(`${API_BASE}/auth/forgot-password/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    alert('OTP Verified.');
                    showStep('step-reset');
                } else {
                    alert(data.message || 'Invalid or expired OTP.');
                }
            } catch (err) {
                alert('Network error. ' + err.message);
            } finally {
                btn.disabled = false; btn.textContent = "Verify OTP";
            }
        }

        async function resetPassword() {
            const email = document.getElementById('email').value.trim();
            const otp = document.getElementById('otp').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword || newPassword !== confirmPassword) {
                return alert('Passwords do not match or are empty.');
            }

            const btn = document.getElementById('btn-reset');
            btn.disabled = true; btn.textContent = "Updating...";

            try {
                const res = await fetch(`${API_BASE}/auth/forgot-password/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp, newPassword })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    alert('Password successfully reset! You can now log in.');
                    window.location.href = 'login.html';
                } else {
                    alert(data.message || 'Failed to reset password.');
                }
            } catch (err) {
                alert('Network error. ' + err.message);
            } finally {
                btn.disabled = false; btn.textContent = "Update Password";
            }
        }
    </script>
</body>

</html>
