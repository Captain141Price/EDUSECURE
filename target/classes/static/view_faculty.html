<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>View Faculty — Faculty Blockchain</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f9fcff;
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      padding: 28px 12px;
    }
    .card {
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    header.page-header {
      background: #0d6efd;
      color: white;
      padding: 18px;
      border-radius: 12px 12px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header.page-header h2 { margin: 0; font-weight: 600; }
    .section-title { font-size: 1.05rem; font-weight:600; color:#223; margin-bottom:8px; }
    textarea.form-control, input.form-control { resize: vertical; }
    .pub-item {
      background: #f9fafb;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      text-align: left;
    }
    .muted { color:#666; font-size:0.95rem; }
    .error-box { background:#fff3f3; border:1px solid #f5c2c7; color:#a71d2a; padding:10px; border-radius:6px; }
    @media (min-width: 992px) { .container-narrow { max-width: 900px; } }
  </style>
</head>
<body>
<!-- Global Navigation -->
<div style="position: absolute; top: 0; left: 0; display: flex; gap: 10px; padding: 15px 20px; width: 100%; box-sizing: border-box; background: rgba(255, 255, 255, 0.95); border-bottom: 1px solid rgba(0,0,0,0.1); z-index: 50;">
  <button onclick="window.history.back()" style="padding: 8px 14px; font-size: 13px; cursor: pointer; border: 1px solid #cbd5e1; border-radius: 6px; background: #f8fafc; font-weight: 600; color: #334155;">⬅ Back</button>
  <button onclick="window.history.forward()" style="padding: 8px 14px; font-size: 13px; cursor: pointer; border: 1px solid #cbd5e1; border-radius: 6px; background: #f8fafc; font-weight: 600; color: #334155;">Forward ➡</button>
  <button onclick="window.location.reload()" style="padding: 8px 14px; font-size: 13px; cursor: pointer; border: 1px solid #cbd5e1; border-radius: 6px; background: #f8fafc; font-weight: 600; color: #334155;">↻ Refresh</button>
  <button onclick="goBackToHome()" style="padding: 8px 14px; font-size: 13px; cursor: pointer; border: none; border-radius: 6px; background: #2563eb; color: white; font-weight: 600; margin-left: 10px;">🏠 Homepage</button>
</div>
<script>
  function goBackToHome() {
      const r = localStorage.getItem('role');
      if (r && (r === 'ROLE_STUDENT' || r.toLowerCase() === 'student')) {
          window.location.href = 'student_dashboard.html';
      } else {
          window.location.href = 'teacher_list.html';
      }
  }
</script>
  <div class="container container-narrow" style="margin-top: 50px;">
    <div class="card overflow-hidden">
      <header class="page-header">
        <h2 class="m-0">Faculty Details</h2>
        <div class="d-flex gap-2">
          <button class="btn btn-danger btn-sm" id="btnDownloadPDF">Download PDF</button>
          <button class="btn btn-success btn-sm" id="btnDownloadExcel">Download Excel</button>
        </div>
      </header>

      <div class="p-4">
        <div id="status" class="mb-3" aria-live="polite"></div>

        <ul class="nav nav-tabs mb-3" role="tablist">
          <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-general" type="button" role="tab">General</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-research" type="button" role="tab">Research</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-activity" type="button" role="tab">Professional</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-participation" type="button" role="tab">Participation</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-projects" type="button" role="tab">Projects</button></li>
        </ul>

        <div class="tab-content">
          <!-- GENERAL -->
          <div class="tab-pane fade show active" id="tab-general" role="tabpanel">
            <div class="mb-3">
              <div class="section-title">Name</div>
              <input id="name" type="text" class="form-control" disabled />
            </div>
            <div class="mb-3">
              <div class="section-title">Email</div>
              <input id="email" type="email" class="form-control" disabled />
            </div>
            <div class="mb-3">
              <div class="section-title">Department</div>
              <input id="department" type="text" class="form-control" disabled />
            </div>
            <div class="mb-3">
              <div class="section-title">Area of Specialization</div>
              <textarea id="specialization" class="form-control" rows="2" disabled></textarea>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <div class="section-title">Teaching Experience</div>
                <input id="teachingExp" type="text" class="form-control" disabled />
              </div>
              <div class="col-md-6">
                <div class="section-title">Qualifications</div>
                <input id="qualifications" type="text" class="form-control" disabled />
              </div>
            </div>

            <div class="row g-3 mt-3">
              <div class="col-md-6">
                <div class="section-title">Date of Joining</div>
                <input id="dateOfJoining" type="date" class="form-control" disabled />
              </div>
              <div class="col-md-6">
                <div class="section-title">Date of Assignment</div>
                <input id="dateOfAssign" type="date" class="form-control" disabled />
              </div>
            </div>
          </div>

          <!-- RESEARCH -->
          <div class="tab-pane fade" id="tab-research" role="tabpanel">
            <div class="text-center">
              <h5 class="section-title mb-3">Research Publications</h5>
              <div id="bibOutput" class="bib-output text-start"></div>
            </div>
          </div>

          <!-- PROFESSIONAL ACTIVITY -->
          <div class="tab-pane fade" id="tab-activity" role="tabpanel">
            <div class="section-title">Professional Activity</div>
            <textarea id="professionalActivity" class="form-control" rows="6" disabled></textarea>
          </div>

          <!-- PARTICIPATION -->
          <div class="tab-pane fade" id="tab-participation" role="tabpanel">
            <div class="section-title">Faculty Participation</div>
            <textarea id="facultyParticipation" class="form-control" rows="8" disabled></textarea>
          </div>

          <!-- PROJECTS -->
          <div class="tab-pane fade" id="tab-projects" role="tabpanel">
            <div class="text-center">
              <h5 class="section-title mb-3">Projects (UG / PG)</h5>
              <div class="card p-3 mx-auto" style="max-width: 800px;">
                <textarea id="projects" class="form-control" rows="8" disabled></textarea>
              </div>
            </div>
          </div>
        </div> <!-- end tab-content -->

      </div> <!-- end padding -->
    </div> <!-- end card -->
  </div> <!-- end container -->

  <!-- External JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <script>
    const apiBase = window.location.origin + "/api";
    const url = new URL(window.location.href);
    const email = url.searchParams.get('email');

    const statusEl = document.getElementById('status');
    const btnPDF = document.getElementById('btnDownloadPDF');
    const btnExcel = document.getElementById('btnDownloadExcel');

    let downloadInProgress = false;

    async function loadFaculty() {
      statusEl.innerHTML = '';
      if (!email) {
        statusEl.innerHTML = '<div class="error-box">No email provided in URL.</div>';
        return;
      }

      try {
        setLoading(true);
        const res = await fetch(`${apiBase}/get?email=${encodeURIComponent(email)}`);
        let data;

        if (!res.ok) {
          const fallback = await fetch(`${apiBase}/view/${encodeURIComponent(email)}`);
          if (!fallback.ok) throw new Error('Failed to fetch faculty data');
          data = await fallback.json();
        } else {
          data = await res.json();
        }

        if (data?.status?.toLowerCase() === 'error') {
          statusEl.innerHTML = `<div class="error-box">${escapeHtml(data.message || 'Faculty not found')}</div>`;
          clearFields();
          return;
        }

        renderFaculty(data);
      } catch (err) {
        console.error(err);
        statusEl.innerHTML = `<div class="error-box">Error loading faculty data.</div>`;
        clearFields();
      } finally {
        setLoading(false);
      }
    }

    function setLoading(isLoading) {
      statusEl.innerHTML = isLoading ? '<div class="text-muted">Loading…</div>' : '';
    }

    function renderFaculty(data) {
      document.getElementById('name').value = data.name || '';
      document.getElementById('email').value = data.email || '';
      document.getElementById('department').value = data.department || '';
      document.getElementById('specialization').value = data.specialization || '';
      document.getElementById('teachingExp').value = data.teachingExp || data.teaching || '';
      document.getElementById('qualifications').value = data.qualifications || '';
      document.getElementById('dateOfJoining').value = data.dateOfJoining || data.joiningDate || '';
      document.getElementById('dateOfAssign').value = data.dateOfAssign || '';
      document.getElementById('professionalActivity').value = data.professionalActivity || '';
      document.getElementById('facultyParticipation').value = data.facultyParticipation || '';
      document.getElementById('projects').value = data.projects || '';

      const bibOutput = document.getElementById('bibOutput');
      bibOutput.innerHTML = '';

      if (Array.isArray(data.publicationEntries) && data.publicationEntries.length) {
        bibOutput.innerHTML = data.publicationEntries.map(pub => {
          return `<div class="pub-item">
            ${pub.title ? `<div><strong>Title:</strong> ${escapeHtml(pub.title)}</div>` : ''}
            ${pub.authors ? `<div><strong>Authors:</strong> ${escapeHtml(pub.authors)}</div>` : ''}
            ${pub.journal ? `<div><strong>Journal:</strong> ${escapeHtml(pub.journal)}</div>` : ''}
            ${pub.year ? `<div><strong>Year:</strong> ${escapeHtml(pub.year)}</div>` : ''}
          </div>`;
        }).join('');
      } else if (data.publications && typeof data.publications === 'string') {
        const lines = data.publications.split(/\r?\n/).filter(Boolean);
        bibOutput.innerHTML = lines.map(line => `<div class="pub-item">${escapeHtml(line)}</div>`).join('');
      } else {
        bibOutput.innerHTML = '<div class="muted">No publications found.</div>';
      }
    }

    function clearFields() {
      ['name','email','department','specialization','teachingExp','qualifications',
       'dateOfJoining','dateOfAssign','professionalActivity','facultyParticipation','projects']
       .forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
      document.getElementById('bibOutput').innerHTML = '';
    }

    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return String(unsafe)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    // Collect faculty data for download
    function collectData() {
      const general = {
        name: document.getElementById('name').value || '',
        email: document.getElementById('email').value || '',
        department: document.getElementById('department').value || '',
        specialization: document.getElementById('specialization').value || '',
        teachingExp: document.getElementById('teachingExp').value || '',
        qualifications: document.getElementById('qualifications').value || '',
        dateOfJoining: document.getElementById('dateOfJoining').value || '',
        dateOfAssign: document.getElementById('dateOfAssign').value || '',
        professionalActivity: document.getElementById('professionalActivity').value || '',
        participation: document.getElementById('facultyParticipation').value || '',
        projects: document.getElementById('projects').value || ''
      };

      const publications = Array.from(document.querySelectorAll('#bibOutput .pub-item')).map(div => div.innerText);

      return { general, publications };
    }

    // Download CSV/Excel
    function downloadExcel() {
      if(downloadInProgress) return;
      downloadInProgress = true;
      const { general, publications } = collectData();

      const rows = [
        ['Field','Value'],
        ['Name', general.name],
        ['Email', general.email],
        ['Department', general.department],
        ['Specialization', general.specialization],
        ['Teaching Experience', general.teachingExp],
        ['Qualifications', general.qualifications],
        ['Date of Joining', general.dateOfJoining],
        ['Date of Assignment', general.dateOfAssign],
        ['Professional Activity', general.professionalActivity],
        ['Participation', general.participation],
        ['Projects', general.projects],
        [],
        ['Publications']
      ];
      publications.forEach(pub => rows.push([pub]));

      const csv = rows.map(r => r.map(c => `"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\r\n');
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${general.name.replace(/\s+/g,'_')||'faculty'}_details.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      downloadInProgress = false;
    }

    // Download PDF



 function downloadPDF() {
  if (downloadInProgress) return;
  downloadInProgress = true;

  const { jsPDF } = window.jspdf;
  const { general, publications } = collectData();
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });

  // Proper display names
  const fieldNames = {
    name: "Name",
    email: "Email",
    department: "Department",
    specialization: "Area of Specialization",
    teachingExp: "Teaching Experience",
    qualifications: "Qualifications",
    dateOfJoining: "Date of Joining",
    dateOfAssign: "Date of Assignment",
    professionalActivity: "Professional Activity",
    participation: "Faculty Participation",
    projects: "Projects"
  };

  // Title
  doc.setFontSize(18);
  doc.setFont('helvetica', 'bold');
  doc.text(`Faculty Report — ${general.name}`, 40, 40);

  // General Info table with proper margins and wrapping
  const generalData = Object.entries(general).map(([key, value]) => [
    fieldNames[key] || key,
    value || ''
  ]);

  doc.autoTable({
    startY: 70,
    head: [['Field', 'Value']],
    body: generalData,
    theme: 'grid',
    headStyles: { fillColor: [13, 110, 253], textColor: 255, fontStyle: 'bold' },
    styles: { fontSize: 10, cellWidth: 'wrap' },
    columnStyles: {
      0: { cellWidth: 120 },  // Field column fixed width
      1: { cellWidth: 400 }   // Value column wraps long text
    },
    margin: { left: 40, right: 40 }
  });

  // Publications table
  if (publications.length) {
    const startY = doc.lastAutoTable.finalY + 20;
    const pubData = publications.map(pub => [pub]);
    doc.autoTable({
      startY,
      head: [['Publications']],
      body: pubData,
      theme: 'grid',
      headStyles: { fillColor: [0, 123, 255], textColor: 255, fontStyle: 'bold' },
      styles: { fontSize: 10, cellWidth: 'wrap' },
      margin: { left: 40, right: 40 }
    });
  }

  doc.save(`${general.name.replace(/\s+/g, '_') || 'faculty'}_Report.pdf`);
  downloadInProgress = false;
}




    btnExcel.addEventListener('click', downloadExcel);
    btnPDF.addEventListener('click', downloadPDF);

    document.addEventListener('DOMContentLoaded', loadFaculty);
  </script>
</body>
</html>
