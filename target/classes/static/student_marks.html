<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Marks - Blockchain ERP</title>
    <style>
        :root {
            --bg: #f4f7f9;
            --panel: #ffffff;
            --accent: #1e293b;
            --muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-bg: #eff6ff;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--accent);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR (Match Dashboard) */
        .sidebar {
            width: 250px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.02);
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--primary);
            color: white;
            text-align: center;
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 0;
            overflow-y: auto;
        }

        .nav-item {
            display: block;
            padding: 12px 24px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }

        .nav-item:hover {
            background: var(--secondary-bg);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--secondary-bg);
            color: var(--primary);
            border-left-color: var(--primary);
        }

        .logout-btn {
            margin: 20px;
            padding: 10px;
            background: #ef4444;
            color: white;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            padding: 15px 30px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        /* TABLE STYLES */
        .table-container {
            background: var(--panel);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            overflow: hidden;
            max-width: 900px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--secondary-bg);
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #f8fafc;
        }

        .grade-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
            background: var(--secondary-bg);
            color: var(--primary);
        }

        .grade-badge.grade-O {
            background: #dcfce7;
            color: #166534;
        }

        .grade-badge.grade-E {
            background: #dbeafe;
            color: #1e40af;
        }

        .grade-badge.grade-A {
            background: #fef9c3;
            color: #854d0e;
        }

        .grade-badge.grade-F {
            background: #fee2e2;
            color: #991b1b;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-style: italic;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Student Portal</h2>
            <div style="font-size: 12px; opacity: 0.8;">Blockchain Secured</div>
        </div>
        <div class="sidebar-nav">
            <a class="nav-item" href="student_dashboard.html">Dashboard Home</a>
            <a class="nav-item active" href="student_marks.html">View Marks</a>
            <a class="nav-item" href="student_attendance.html">View Attendance</a>
            <a class="nav-item" href="student_mar.html">MAR Activities</a>
            <a class="nav-item" href="student_moocs.html">MOOCs Courses</a>
            <a class="nav-item" href="student_verify.html">Record Verification</a>
        </div>
        <div class="logout-btn" onclick="logout()">Log Out</div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="topbar">
            <h2>Academic Marks</h2>
            <div style="font-size: 13px; color: var(--muted); font-weight: 500;">
                <span id="welcomeName" style="color: var(--accent); font-weight: 700;">Student</span>
            </div>
        </div>

        <div class="content-area">
            <div class="table-container">
                <table id="marksTable">
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Semester</th>
                            <th>Average Marks</th>
                            <th>Grade</th>
                        </tr>
                    </thead>
                    <tbody id="marksBody">
                        <tr>
                            <td colspan="4" class="loading">Loading blockchain records...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const role = localStorage.getItem("role");
        const email = localStorage.getItem("email");
        const studentName = localStorage.getItem("username");
        const sessionToken = localStorage.getItem("sessionToken");

        if (!role || role.toLowerCase() !== "student" || !sessionToken) {
            window.location.href = "login.html";
        }

        // Verify session with backend (same as other student pages)
        async function checkSession() {
            try {
                const res = await fetch(window.location.origin + `/auth/verify-session?email=${encodeURIComponent(email)}&token=${encodeURIComponent(sessionToken)}`);
                if (!res.ok) {
                    alert("Session conflict: Logged in from another device");
                    localStorage.clear();
                    window.location.href = "login.html";
                }
            } catch (err) {
                console.error("Session verification failed", err);
            }
        }
        checkSession();

        document.getElementById("welcomeName").textContent = studentName || "Student";

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        window.onload = async () => {
            const tbody = document.getElementById("marksBody");
            try {
                const res = await fetch(window.location.origin + `/api/student/marks?email=${encodeURIComponent(email)}`);
                if (res.ok) {
                    const marks = await res.json();
                    tbody.innerHTML = "";

                    if (marks.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="4" class="empty-state">No marks have been recorded on the blockchain yet.</td></tr>`;
                        return;
                    }

                    marks.forEach(m => {
                        const tr = document.createElement("tr");
                        tr.innerHTML = `
                            <td style="font-weight: 600;">${m.subject || 'Unknown'}</td>
                            <td>${m.semester || '--'}</td>
                            <td style="font-weight: 700; color: var(--primary);">${m.marks}</td>
                            <td><span class="grade-badge grade-${m.grade}">${m.grade}</span></td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="4" class="empty-state" style="color: #ef4444;">Error fetching marks.</td></tr>`;
                }
            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="4" class="empty-state" style="color: #ef4444;">Connection error.</td></tr>`;
            }
        };

    </script>
</body>

</html>
